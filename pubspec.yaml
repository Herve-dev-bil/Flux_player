name: flux_player
description: "Flux Player by Game-Changer Studios. Your library. Your way."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # Video engine (HARD RULE: media_kit only, never video_player/chewie)
  media_kit: ^1.2.6
  media_kit_video: ^1.3.0
  media_kit_libs_video: ^1.0.6

  # State management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.2

  # Data
  drift: ^2.28.1
  drift_flutter: ^0.2.4
  dio: ^5.8.0

  # Navigation & transitions
  go_router: ^14.8.1
  animations: ^2.0.11

  # Files & permissions
  file_picker: ^10.2.0
  path_provider: ^2.1.5
  path: ^1.9.0
  permission_handler: ^12.0.0

  # Background audio
  audio_service: ^0.18.18

  # UI
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.0.0

  # Desktop (Windows)
  window_manager: ^0.4.3
  tray_manager: ^0.2.4
  desktop_drop: ^0.5.0

  # Secure storage & logging
  flutter_secure_storage: ^9.2.4
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.28.1

flutter:
  uses-material-design: true
  generate: true
